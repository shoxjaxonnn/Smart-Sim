            - generic [ref=e125]: "HTML asoslari: Veb-sahifalar yaratish HTML (HyperText Markup Language) veb-sahifalarning asosiy qurilish tilidir. U brauzerga sahifadagi kontentni qanday ko'rsatishni aytadi. HTML teglar (tags) yordamida matn, rasm, havola, jadval va boshqa elementlar joylashtiriladi. HTML birinchi marta 1991-yilda Tim Berners-Li tomonidan ishlab chiqilgan. Hozirgi zamonaviy versiyasi HTML5 bo'lib, u multimedia, grafika va interaktiv ilovalarni qo'llab-quvvatlaydi. 1. HTML hujjatning asosiy tuzilmasi Har bir HTML hujjat quyidagi asosiy tuzilmaga ega. Bu tuzilma brauzerga hujjat turi va tarkibini aniqlashga yordam beradi: <!DOCTYPE html> <html lang=\"uz\"> <head> <meta charset=\"UTF-8\"> <title>Sahifa sarlavhasi</title> </head> <body> <h1>Salom, dunyo!</h1> <p>Bu mening birinchi veb-sahifam.</p> </body> </html> Bu tuzilmaning har bir qismi muhim vazifani bajaradi: <!DOCTYPE html> - brauzerga hujjat HTML5 formatida ekanligini bildiradi <html> - butun hujjatni o'rab turuvchi ildiz element <head> - metadata, stillar va skriptlar joylashadigan qism <body> - foydalanuvchiga ko'rinadigan barcha kontent joylashadigan qism 2. Matn teglari HTML da matn bilan ishlash uchun bir nechta asosiy teglar mavjud. Ular matn tuzilmasini va ko'rinishini belgilaydi. 2.1 Sarlavha teglari (Headings) HTML da olti darajali sarlavha mavjud. H1 eng katta va eng muhim, H6 eng kichik: <h1>Birinchi darajali sarlavha</h1> <h2>Ikkinchi darajali sarlavha</h2> <h3>Uchinchi darajali sarlavha</h3> Muhim qoida: Har bir sahifada faqat bitta H1 tegi bo'lishi kerak. Bu qoida SEO (qidiruv tizimi optimizatsiyasi) uchun juda muhim. 2.2 Paragraf va formatlash Paragraflar uchun <p> tegi ishlatiladi. Matnni formatlash uchun quyidagi teglar qo'llaniladi: Teg Vazifasi Misol <strong> Qalin (muhim) matn Bu muhim matn <em> Kursiv (ta'kidlangan) matn Bu ta'kidlangan matn <mark> Belgilangan matn Bu belgilangan matn <code> Kod parchalari console.log() <br> Qator uzilishi Yangi qatorga o'tish <hr> Gorizontal chiziq Bo'limlarni ajratadi 3. Ro'yxatlar (Lists) HTML da ikki asosiy ro'yxat turi mavjud: tartibsiz (unordered) va tartiblangan (ordered). 3.1 Tartibsiz ro'yxat <ul> <li>HTML - tuzilma</li> <li>CSS - dizayn</li> <li>JavaScript - interaktivlik</li> </ul> 3.2 Tartiblangan ro'yxat <ol> <li>Birinchi qadam</li> <li>Ikkinchi qadam</li> <li>Uchinchi qadam</li> </ol> 4. Havolalar va rasmlar Havolalar veb-sahifalarni bir-biriga bog'laydi. Rasmlar sahifaga vizual kontent qo'shadi. 4.1 Havolalar (Links) Havola yaratish uchun <a> (anchor) tegi ishlatiladi: <a href=\"https://example.com\">Saytga o'tish</a> <a href=\"#section2\">Sahifa ichidagi bo'limga o'tish</a> <a href=\"mailto:info@example.com\">Email yuborish</a> target=\"_blank\" atributi havolani yangi oynada ochish uchun ishlatiladi. Xavfsizlik uchun doimo rel=\"noopener noreferrer\" qo'shing. 4.2 Rasmlar (Images) Rasm qo'yish uchun <img> tegi ishlatiladi. Bu o'zi yopiladigan teg (self-closing): <img src=\"rasm.jpg\" alt=\"Rasm tavsifi\" width=\"600\"> alt atributi juda muhim: u rasm yuklanmasa ko'rinadigan matn, ekran o'quvchilar (screen readers) uchun tavsif, va SEO uchun signal vazifasini bajaradi. 5. Jadvallar (Tables) Jadvallar ma'lumotlarni ustun va qatorlarda tartiblab ko'rsatish uchun ishlatiladi: <table> <thead> <tr> <th>Ism</th> <th>Yosh</th> <th>Shahar</th> </tr> </thead> <tbody> <tr> <td>Ali</td> <td>25</td> <td>Toshkent</td> </tr> </tbody> </table> Jadval teglari haqida qisqacha: Teg Vazifasi <table> Jadval konteyneri <thead> Jadval sarlavhasi guruhi <tbody> Jadval asosiy qismi <tr> Jadval qatori (table row) <th> Sarlavha katagi (qalin, markazlashgan) <td> Ma'lumot katagi (table data) 6. Formalar (Forms) Formalar foydalanuvchidan ma'lumot olish uchun ishlatiladi. Login sahifasi, qidiruv maydoni, ro'yxatdan o'tish - bularning barchasi formalar orqali ishlaydi. <form action=\"/login\" method=\"POST\"> <label for=\"username\">Foydalanuvchi nomi:</label> <input type=\"text\" id=\"username\" name=\"username\" required> <label for=\"password\">Parol:</label> <input type=\"password\" id=\"password\" name=\"password\" required> <button type=\"submit\">Kirish</button> </form> HTML5 da qo'shimcha input turlari mavjud: type=\"email\" - email manzilini tekshiradi type=\"number\" - faqat raqamlarni qabul qiladi type=\"date\" - sana tanlagich ko'rsatadi type=\"file\" - fayl yuklash imkonini beradi type=\"range\" - slayder (diapazon) ko'rsatadi 7. Semantik HTML Semantik teglar sahifa tuzilmasiga ma'no qo'shadi. Ular brauzer, qidiruv tizimlari va ekran o'quvchilar uchun sahifa tarkibini tushunishga yordam beradi. Semantik teglar ro'yxati va ularning vazifalari: Teg Vazifasi Misol ishlatish <header> Sahifa yoki bo'lim sarlavhasi Logo, navigatsiya <nav> Navigatsiya havolalari Menyu, breadcrumb <main> Asosiy kontent Sahifaning yagona asosiy qismi <article> Mustaqil kontent bo'lagi Blog post, yangilik <section> Mavzuiy bo'lim Sahifa bo'limlari <aside> Yon panel kontent Sidebar, reklama <footer> Sahifa yoki bo'lim pastki qismi Mualliflik, havolalar Nima uchun semantik HTML muhim? Birinchidan, SEO uchun: qidiruv tizimlari sahifa tuzilmasini yaxshiroq tushunadi. Ikkinchidan, accessibility uchun: ekran o'quvchilar ko'zi ojiz foydalanuvchilarga sahifani to'g'ri o'qib beradi. Uchinchidan, kod o'qilishi uchun: dasturchilar sahifa tuzilmasini tezroq tushunadi. 8. HTML va CSS bog'lanishi CSS (Cascading Style Sheets) HTML elementlarining ko'rinishini boshqaradi. CSSni HTMLga uch xil usulda ulash mumkin: Inline (teg ichida): style atributi orqali. Faqat bitta elementga ta'sir qiladi. Internal (head ichida): <style> tegi ichida. Faqat shu sahifaga ta'sir qiladi. External (tashqi fayl): <link> tegi orqali. Bir nechta sahifaga ta'sir qiladi. Bu eng tavsiya etiladigan usul. <link rel=\"stylesheet\" href=\"styles.css\"> Xulosa HTML veb-dasturlashning poydevoridir. Uni o'rganmasdan zamonaviy veb-texnologiyalarni tushunish mumkin emas. Ushbu hujjatda HTML ning asosiy tushunchalari, teglari va amaliy misollari keltirildi. Keyingi qadamlar: CSS orqali dizayn qo'shish, JavaScript orqali interaktivlik qo'shish, va responsiv dizayn (turli ekran o'lchamlariga moslashish) ni o'rganish. Eslatma: Amaliyot eng yaxshi o'qituvchidir. Har bir o'rganilgan tegni darhol sinab ko'ring va o'z loyihalaringizda qo'llang."
